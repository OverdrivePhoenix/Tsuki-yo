<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <filter id="neon-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="400" height="400" fill="#020002" />

  <g filter="url(#neon-glow)">
    
    <path d="M 285 95 A 120 120 0 1 0 310 220" fill="none" stroke="#ff1493" stroke-width="10" stroke-linecap="round"/>
    
    <line x1="120" y1="280" x2="120" y2="340" stroke="#ff1493" stroke-width="8" stroke-dasharray="10, 15, 5" stroke-linecap="round"/>
    <line x1="150" y1="300" x2="150" y2="370" stroke="#ff1493" stroke-width="10" stroke-dasharray="5, 10, 20" stroke-linecap="round"/>
    <line x1="180" y1="315" x2="180" y2="390" stroke="#ff1493" stroke-width="12" stroke-dasharray="20, 10, 5" stroke-linecap="round"/>
    <line x1="210" y1="315" x2="210" y2="360" stroke="#ff1493" stroke-width="10" stroke-dasharray="8, 12" stroke-linecap="round"/>
    <line x1="240" y1="295" x2="240" y2="350" stroke="#ff1493" stroke-width="8" stroke-dasharray="15, 8" stroke-linecap="round"/>
    <line x1="270" y1="265" x2="270" y2="310" stroke="#ff1493" stroke-width="8" stroke-dasharray="5, 10, 5" stroke-linecap="round"/>
    
    <circle cx="300" cy="80" r="5" fill="#ff1493"/>
    <circle cx="325" cy="110" r="7" fill="#ff1493"/>
    <circle cx="340" cy="145" r="4" fill="#ff1493"/>
    <circle cx="335" cy="180" r="3" fill="#ff1493"/>
    
  </g>

  <text x="180" y="210" font-family="sans-serif" font-size="72" font-weight="900" fill="#ffffff" text-anchor="middle" filter="url(#neon-glow)">月夜</text>
  
  <text x="180" y="260" font-family="'Courier New', Courier, monospace" font-size="18" font-weight="bold" fill="#ffb6c1" text-anchor="middle" letter-spacing="6">TSUKI-YO</text>
  
</svg>